<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="no">
<meta name="apple-mobile-web-app-title" content="glean">
<meta name="theme-color" content="#f5f6f3">
<title>glean</title>
<style>
  :root{
    --paper:#f5f6f3; --surface:#ffffff; --ink:#23282c; --inkSoft:#454c52;
    --muted:#868d92; --faint:#a7adb0; --line:#e6e9e4; --lineSoft:#eef0ec;
    --accent:#54579c; --accentSoft:#ecedfa;
    --warm:#a9781f; --warmBg:#f7f0dd; --warmInk:#5d4715;
    --good:#3f7d52; --danger:#a14545;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); }
  body{ font-size:16px; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
  textarea,input{ resize:none; font-family:var(--sans); }
  textarea::placeholder,input::placeholder{ color:var(--faint); }
  button{ font-family:var(--sans); cursor:pointer; }

  .head{ position:sticky; top:0; z-index:5; background:var(--paper);
    border-bottom:1px solid var(--lineSoft); padding:14px 18px 12px; }
  .head-in{ max-width:560px; margin:0 auto; }
  .wm{ font-family:var(--mono); font-size:20px; letter-spacing:1px; font-weight:500; }
  .tag{ font-size:12.5px; color:var(--muted); margin-top:1px; }
  .tabs{ display:flex; gap:4px; margin-top:11px; background:var(--lineSoft); padding:3px; border-radius:12px; width:fit-content; }
  .tab{ border:none; background:transparent; font-size:13px; font-weight:600; color:var(--muted);
    padding:6px 16px; border-radius:9px; }
  .tab.on{ background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(35,40,44,.08); }
  .cap{ margin-top:12px; background:var(--surface); border:1px solid var(--line);
    border-radius:18px; padding:12px 14px 9px; box-shadow:0 1px 2px rgba(35,40,44,.04); }
  .cap textarea{ width:100%; border:none; background:transparent; font-size:16px; line-height:1.5; color:var(--ink); outline:none; }
  .caprow{ display:flex; justify-content:space-between; align-items:center; margin-top:4px; gap:8px; }
  .mic{ width:38px; height:38px; border-radius:12px; border:1px solid var(--line);
    background:var(--paper); color:var(--inkSoft); display:flex; align-items:center; justify-content:center; }
  .mic.live{ background:var(--accent); color:#fff; border-color:transparent; animation:pulse 1.2s ease-out infinite; }
  @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(84,87,156,.45);} 100%{box-shadow:0 0 0 14px rgba(84,87,156,0);} }
  .save{ border:none; border-radius:12px; padding:9px 18px; font-size:14px; font-weight:600; color:#fff; background:var(--accent); }
  .save:disabled{ background:#c3c5cf; cursor:default; }
  .stat{ font-family:var(--mono); font-size:11px; color:var(--muted); margin:6px 2px 0; min-height:14px; }
  .stat.err{ color:var(--danger); }

  .wrap{ padding:14px 18px 48px; max-width:560px; margin:0 auto; }
  .row{ display:flex; justify-content:space-between; align-items:baseline; }
  .slabel{ font-family:var(--mono); font-size:11px; letter-spacing:1.5px; color:var(--faint); text-transform:uppercase; }
  .controls{ display:flex; justify-content:space-between; align-items:center; gap:8px; margin:2px 0 4px; }
  .filters{ display:flex; gap:6px; flex-wrap:wrap; margin:10px 0 4px; }
  .chip{ font-family:var(--mono); font-size:11px; padding:4px 10px; border-radius:20px;
    border:1px solid var(--line); background:var(--surface); color:var(--muted); white-space:nowrap; }
  .seg{ display:flex; gap:3px; background:var(--lineSoft); padding:2px; border-radius:9px; }
  .seg button{ border:none; background:transparent; font-family:var(--mono); font-size:10.5px; text-transform:uppercase;
    letter-spacing:.5px; color:var(--muted); padding:4px 9px; border-radius:7px; }
  .seg button.on{ background:var(--surface); color:var(--ink); }

  .card{ background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--line);
    border-radius:14px; padding:13px 15px 12px; margin-top:11px; box-shadow:0 1px 2px rgba(35,40,44,.04); }
  .toprow{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .badge{ display:inline-block; font-family:var(--mono); font-size:10.5px; letter-spacing:.6px;
    padding:3px 9px; border-radius:20px; text-transform:uppercase; }
  .filed{ font-family:var(--mono); font-size:10px; letter-spacing:.4px; color:var(--good); text-transform:uppercase; }
  .title{ font-size:16px; font-weight:600; letter-spacing:-.2px; margin:9px 0 5px; line-height:1.3; }
  .body{ font-size:14px; line-height:1.55; color:var(--inkSoft); white-space:pre-wrap; }
  .take{ margin-top:11px; background:var(--warmBg); border-left:2.5px solid var(--warm);
    border-radius:0 8px 8px 0; padding:8px 11px; }
  .takel{ font-family:var(--mono); font-size:9.5px; letter-spacing:1px; color:var(--warm); text-transform:uppercase; margin-bottom:3px; }
  .taket{ font-size:13.5px; line-height:1.45; color:var(--warmInk); }
  .tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:11px; }
  .pill{ font-family:var(--mono); font-size:11px; color:var(--muted); background:var(--paper);
    border:1px solid var(--lineSoft); border-radius:6px; padding:2px 7px; }
  .foot{ display:flex; justify-content:space-between; align-items:center; margin-top:12px;
    padding-top:9px; border-top:1px solid var(--lineSoft); gap:8px; }
  .time{ font-family:var(--mono); font-size:11px; color:var(--faint); }
  .acts{ display:flex; gap:6px; align-items:center; }
  .btn-sm{ font-family:var(--mono); font-size:11px; border-radius:9px; padding:5px 11px; border:1px solid var(--line);
    background:var(--paper); color:var(--inkSoft); }
  .btn-file{ border-color:transparent; background:var(--accent); color:#fff; }
  .link{ font-family:var(--mono); font-size:11px; color:var(--accent); text-decoration:none; }
  .togg{ font-family:var(--mono); font-size:11px; color:var(--muted); background:none; border:none; padding:3px 6px; border-radius:7px; }
  .note-sm{ font-size:12.5px; line-height:1.45; margin-top:10px; }
  .ed-label{ font-family:var(--mono); font-size:9.5px; letter-spacing:.8px; color:var(--faint); text-transform:uppercase; margin:10px 0 3px; }
  .ed-input{ width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:var(--paper); color:var(--ink); }
  .ed-area{ width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:9px; font-size:14px; line-height:1.5; background:var(--paper); color:var(--ink); min-height:90px; }

  .shim{ background:linear-gradient(90deg,var(--lineSoft) 25%,var(--line) 37%,var(--lineSoft) 63%);
    background-size:400px 100%; animation:sweep 1.25s ease-in-out infinite; border-radius:5px; }
  .spin{ width:11px; height:11px; border:2px solid rgba(84,87,156,.25); border-top-color:var(--accent);
    border-radius:50%; display:inline-block; animation:spin .7s linear infinite; vertical-align:middle; }
  .anim{ animation:stamp .34s ease both; }
  .empty{ font-size:15px; line-height:1.55; color:var(--inkSoft); margin:24px 0 18px; }
  .focus:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .config{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px; margin-top:14px; }
  .config h3{ margin:0 0 6px; font-size:14px; }
  .config p{ margin:0 0 10px; font-size:13px; color:var(--inkSoft); line-height:1.5; }
  .config input{ width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:10px;
    font-family:var(--mono); font-size:12px; background:var(--paper); color:var(--ink); }
  .config .btn{ margin-top:8px; border:none; border-radius:10px; padding:8px 14px; font-size:13px; font-weight:600; color:#fff; background:var(--accent); }
  @keyframes sweep{ 0%{background-position:-200px 0;} 100%{background-position:280px 0;} }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes stamp{ from{ opacity:0; transform:translateY(7px); } to{ opacity:1; transform:none; } }
  @media (prefers-reduced-motion: reduce){ .anim,.shim,.spin,.mic.live{ animation:none !important; } }
</style>
</head>
<body>
  <div class="head"><div class="head-in">
    <div class="wm">glean</div>
    <div class="tag">Capture what you learn. It sorts itself.</div>
    <div class="tabs">
      <button id="tabCap" class="tab on focus">Capture</button>
      <button id="tabRev" class="tab focus">Review</button>
    </div>
    <div id="capBox" class="cap">
      <textarea id="ta" rows="3" placeholder="What did you learn?"></textarea>
      <div class="caprow">
        <button id="mic" class="mic focus" aria-label="Record voice note">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v3"/></svg>
        </button>
        <button id="save" class="save focus" disabled>Save note</button>
      </div>
      <div id="stat" class="stat"></div>
    </div>
  </div></div>

  <div class="wrap">
    <div id="setup"></div>

    <div id="captureBody">
      <div class="row"><span class="slabel">Stream</span><span id="count" class="slabel"></span></div>
      <div id="filters" class="filters"></div>
      <div id="stream"></div>
    </div>

    <div id="reviewBody" style="display:none">
      <div class="controls">
        <span class="slabel">Library</span>
        <div class="seg">
          <button id="segUnfiled" class="on focus" data-show="unfiled">unfiled</button>
          <button id="segAll" class="focus" data-show="all">all</button>
        </div>
      </div>
      <div id="rFilters" class="filters"></div>
      <div id="rStatus" class="stat"></div>
      <div id="rStream"></div>
    </div>
  </div>

<script>
(function(){
  var ENDPOINT = localStorage.getItem('glean.endpoint') || '';
  var HUE = {
    "spirituality":"#5b5fae","personal revelation":"#a9781f","books":"#2f8f86",
    "work & analysis":"#3f6f9f","experiences":"#b5567a","ideas":"#8a5fb0",
    "relationships":"#c76f57","health":"#4f9a5e"
  };
  function hueFor(c){ return HUE[(c||"").trim().toLowerCase()] || "#6e7479"; }
  function rgba(hex,a){ var h=hex.replace("#",""); return "rgba("+parseInt(h.slice(0,2),16)+","+parseInt(h.slice(2,4),16)+","+parseInt(h.slice(4,6),16)+","+a+")"; }
  function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function aesc(s){ return esc(s).replace(/"/g,"&quot;"); }
  function fmt(t){
    var d = t ? new Date(t) : new Date();
    if (isNaN(d)) return "";
    var sameDay = d.toDateString() === new Date().toDateString();
    return sameDay ? d.toLocaleTimeString([], {hour:"numeric",minute:"2-digit"})
                   : d.toLocaleDateString([], {month:"short",day:"numeric",year:"numeric"});
  }

  // ── shared API ────────────────────────────────────────────────────────
  function post(payload){
    return fetch(ENDPOINT, {
      method:'POST', headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify(payload), redirect:'follow'
    }).then(function(r){ return r.json(); });
  }

  // ── DOM refs ──────────────────────────────────────────────────────────
  var ta = document.getElementById('ta');
  var saveBtn = document.getElementById('save');
  var micBtn = document.getElementById('mic');
  var stat = document.getElementById('stat');
  function setStat(t,e){ stat.textContent=t||''; stat.classList.toggle('err',!!e); }

  // ── mode switching ────────────────────────────────────────────────────
  var mode = 'capture';
  document.getElementById('tabCap').addEventListener('click', function(){ setMode('capture'); });
  document.getElementById('tabRev').addEventListener('click', function(){ setMode('review'); });
  function setMode(m){
    mode = m;
    document.getElementById('tabCap').classList.toggle('on', m==='capture');
    document.getElementById('tabRev').classList.toggle('on', m==='review');
    document.getElementById('capBox').style.display = m==='capture' ? '' : 'none';
    document.getElementById('captureBody').style.display = m==='capture' ? '' : 'none';
    document.getElementById('reviewBody').style.display = m==='review' ? '' : 'none';
    if (m==='review') loadAll();
  }

  // ── one-time setup card ───────────────────────────────────────────────
  function renderSetup(){
    var s = document.getElementById('setup');
    if (ENDPOINT) { s.innerHTML=''; return; }
    s.innerHTML =
      '<div class="config"><h3>One-time setup</h3>'+
      '<p>Paste your Apps Script web app URL (ends in <code>/exec</code>). Stored only on this device.</p>'+
      '<input id="ep" placeholder="https://script.google.com/macros/s/…/exec" autocomplete="off" autocapitalize="off" spellcheck="false">'+
      '<button class="btn focus" id="epSave">Save</button></div>';
    document.getElementById('epSave').addEventListener('click', function(){
      var v = document.getElementById('ep').value.trim();
      if (!/^https:\/\/script\.google\.com\/.+\/exec$/.test(v)) { setStat('That URL should end in /exec.', true); return; }
      localStorage.setItem('glean.endpoint', v); ENDPOINT=v; renderSetup(); setStat('Connected.');
    });
  }

  // ════════════════════ CAPTURE ════════════════════
  var notes = [], filter = "All", uid = 0;

  ta.addEventListener('input', function(){ saveBtn.disabled = !ta.value.trim(); });
  ta.addEventListener('keydown', function(e){ if ((e.metaKey||e.ctrlKey) && e.key==='Enter'){ e.preventDefault(); doSaveText(); } });
  saveBtn.addEventListener('click', doSaveText);

  function doSaveText(){
    var raw = ta.value.trim();
    if (!raw || !ENDPOINT) { if(!ENDPOINT) setStat('Add your Apps Script URL below first.', true); return; }
    var id = ++uid;
    notes.unshift({ _id:id, _status:'processing', raw:raw, time:new Date().toISOString() });
    ta.value=''; saveBtn.disabled=true; setStat(''); renderStream();
    post({ text: raw }).then(function(res){
      if (res && res.ok) applyCap(id, res.note); else capErr(id, (res&&res.error)||'Something went wrong.');
    }).catch(function(err){ capErr(id, err.message||'Network error.'); });
  }
  function applyCap(id,n){ for(var i=0;i<notes.length;i++) if(notes[i]._id===id){ n._id=id; n._status='done'; notes[i]=n; break; } renderStream(); }
  function capErr(id,msg){ for(var i=0;i<notes.length;i++) if(notes[i]._id===id){ notes[i]._status='error'; notes[i]._err=msg; break; } renderStream(); }

  // voice
  var rec=null, chunks=[], mime='';
  micBtn.addEventListener('click', function(){
    if (!ENDPOINT){ setStat('Add your Apps Script URL below first.', true); return; }
    if (rec && rec.state==='recording') stopRec(); else startRec();
  });
  function pickMime(){
    var p=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/aac','audio/ogg'];
    for (var i=0;i<p.length;i++) if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(p[i])) return p[i];
    return '';
  }
  function startRec(){
    if (!navigator.mediaDevices || !window.MediaRecorder){ setStat('This browser can\'t record audio.', true); return; }
    setStat('Asking for mic permission…');
    navigator.mediaDevices.getUserMedia({ audio:true }).then(function(stream){
      mime = pickMime();
      try { rec = mime ? new MediaRecorder(stream,{mimeType:mime}) : new MediaRecorder(stream); }
      catch(e){ rec = new MediaRecorder(stream); }
      chunks=[];
      rec.ondataavailable=function(e){ if(e.data&&e.data.size) chunks.push(e.data); };
      rec.onstop=function(){ stream.getTracks().forEach(function(t){t.stop();}); finishRec(); };
      rec.start(); micBtn.classList.add('live'); setStat('Recording… tap to stop.');
    }).catch(function(){ setStat('Mic blocked. Allow it in your browser\'s site settings, and check iOS Settings → your browser → Microphone.', true); });
  }
  function stopRec(){ if (rec && rec.state==='recording') rec.stop(); micBtn.classList.remove('live'); }
  function finishRec(){
    var blob = new Blob(chunks,{ type: rec.mimeType||mime||'audio/webm' });
    if (!blob.size){ setStat('Didn\'t catch any audio — try again.', true); return; }
    setStat('Transcribing…');
    var id=++uid;
    notes.unshift({ _id:id, _status:'processing', raw:'(voice note)', time:new Date().toISOString() });
    renderStream();
    var reader=new FileReader();
    reader.onload=function(){
      var b64=String(reader.result).split(',')[1]||'';
      post({ audio:b64, mimeType:blob.type||'audio/webm' }).then(function(res){
        if (res && res.ok){ applyCap(id,res.note); setStat(''); } else { capErr(id,(res&&res.error)||'Couldn\'t transcribe.'); setStat(''); }
      }).catch(function(err){ capErr(id, err.message||'Network error.'); setStat(''); });
    };
    reader.readAsDataURL(blob);
  }

  document.getElementById('filters').addEventListener('click', function(e){
    var b=e.target.closest('.chip'); if(b){ filter=b.getAttribute('data-cat'); renderStream(); }
  });
  document.getElementById('stream').addEventListener('click', function(e){
    var t=e.target.closest('[data-act]'); if(!t) return;
    var id=+t.getAttribute('data-id');
    if (t.getAttribute('data-act')==='toggle'){ for(var i=0;i<notes.length;i++) if(notes[i]._id===id){ notes[i]._showRaw=!notes[i]._showRaw; break; } renderStream(); }
  });

  function renderStream(){
    var done = notes.filter(function(n){ return n._status==='done'; });
    document.getElementById('count').textContent = done.length ? (done.length+' this session') : '';
    var cats=['All']; done.forEach(function(n){ if(cats.indexOf(n.category)===-1) cats.push(n.category); });
    document.getElementById('filters').innerHTML = done.length===0 ? '' : cats.map(function(c){
      var on=filter===c, hue=c==='All'?'#54579c':hueFor(c);
      var st = on ? ('border-color:'+rgba(hue,.5)+';background:'+rgba(hue,.12)+';color:'+hue+';') : '';
      return '<button class="chip focus" data-cat="'+aesc(c)+'" style="'+st+'">'+esc(c.toLowerCase())+'</button>';
    }).join('');
    var stream=document.getElementById('stream');
    if (notes.length===0){ stream.innerHTML = ENDPOINT ? '<div class="empty">Tap the mic and start talking, or type a thought — it\'ll come back titled, tagged, and filed in your Sheet.</div>' : ''; return; }
    var vis=notes.filter(function(n){ return filter==='All'||n.category===filter||n._status!=='done'; });
    stream.innerHTML = vis.map(capCard).join('');
  }
  function capCard(n){
    if (n._status==='processing')
      return '<div class="card"><div class="body" style="color:var(--faint)">'+esc(n.raw)+'</div>'+
        '<div style="margin-top:12px;display:flex;flex-direction:column;gap:7px"><div class="shim" style="height:11px;width:42%"></div><div class="shim" style="height:9px;width:72%"></div></div>'+
        '<div style="margin-top:11px;font-family:var(--mono);font-size:11px;color:var(--muted)"><span class="spin"></span> organizing…</div></div>';
    if (n._status==='error')
      return '<div class="card"><div class="body">'+esc(n.raw)+'</div><div class="note-sm" style="color:var(--danger)">'+esc(n._err||'Couldn\'t sort that one — your note is safe.')+'</div></div>';
    var hue=hueFor(n.category);
    var h='<div class="card" style="border-left-color:'+hue+'">';
    h+='<span class="badge anim" style="color:'+hue+';background:'+rgba(hue,.11)+';border:1px solid '+rgba(hue,.28)+'">'+esc(n.category)+'</span>';
    h+='<div class="title anim" style="animation-delay:.04s">'+esc(n.title)+'</div>';
    h+='<div class="body anim" style="animation-delay:.08s">'+esc(n._showRaw?n.raw:n.cleaned)+'</div>';
    if (n.takeaway) h+='<div class="take anim" style="animation-delay:.12s"><div class="takel">Takeaway</div><div class="taket">'+esc(n.takeaway)+'</div></div>';
    if (n.tags&&n.tags.length) h+='<div class="tags anim" style="animation-delay:.16s">'+n.tags.map(function(t){return '<span class="pill">#'+esc(t)+'</span>';}).join('')+'</div>';
    h+='<div class="foot"><span class="time">'+esc(fmt(n.time))+'</span><button class="togg focus" data-act="toggle" data-id="'+n._id+'" style="'+(n._showRaw?'color:var(--accent)':'')+'">'+(n._showRaw?'cleaned':'original')+'</button></div>';
    return h+'</div>';
  }

  // ════════════════════ REVIEW ════════════════════
  var all = [], rFilter = "All", rShow = "unfiled", editing = null, rLoading = false;
  var rStatus = document.getElementById('rStatus');
  function setR(t,e){ rStatus.textContent=t||''; rStatus.classList.toggle('err',!!e); }

  document.getElementById('segUnfiled').addEventListener('click', function(){ rShow='unfiled'; segUI(); renderReview(); });
  document.getElementById('segAll').addEventListener('click', function(){ rShow='all'; segUI(); renderReview(); });
  function segUI(){
    document.getElementById('segUnfiled').classList.toggle('on', rShow==='unfiled');
    document.getElementById('segAll').classList.toggle('on', rShow==='all');
  }
  document.getElementById('rFilters').addEventListener('click', function(e){
    var b=e.target.closest('.chip'); if(b){ rFilter=b.getAttribute('data-cat'); renderReview(); }
  });

  function loadAll(){
    if (!ENDPOINT){ setR('Add your Apps Script URL first (Capture tab).', true); return; }
    rLoading = true; editing = null; renderReview();
    post({ action:'getAll' }).then(function(res){
      rLoading = false;
      if (res && res.ok){ all = res.notes || []; renderReview(); }
      else setR((res&&res.error)||'Could not load notes.', true);
    }).catch(function(err){ rLoading=false; setR(err.message||'Network error.', true); });
  }

  document.getElementById('rStream').addEventListener('click', function(e){
    var t=e.target.closest('[data-act]'); if(!t) return;
    var row=+t.getAttribute('data-row'); var act=t.getAttribute('data-act');
    if (act==='edit'){ editing=row; renderReview(); }
    else if (act==='cancel'){ editing=null; renderReview(); }
    else if (act==='save'){ saveEdit(row); }
    else if (act==='file'){ fileRow(row); }
  });

  function noteByRow(row){ for(var i=0;i<all.length;i++) if(all[i].row===row) return all[i]; return null; }

  function saveEdit(row){
    var n = noteByRow(row); if(!n) return;
    var cat = document.getElementById('e-cat-'+row).value.trim() || n.category;
    var ttl = document.getElementById('e-ttl-'+row).value.trim() || n.title;
    var bdy = document.getElementById('e-bdy-'+row).value;
    setR('Saving…');
    post({ action:'update', row:row, category:cat, title:ttl, cleaned:bdy }).then(function(res){
      if (res && res.ok){ n.category=cat; n.title=ttl; n.cleaned=bdy; editing=null; setR(''); renderReview(); }
      else setR((res&&res.error)||'Save failed.', true);
    }).catch(function(err){ setR(err.message||'Network error.', true); });
  }

  function fileRow(row){
    var n = noteByRow(row); if(!n) return;
    setR('Filing into ' + n.category + '…');
    post({ action:'file', row:row }).then(function(res){
      if (res && res.ok){ n.filed=res.filed; n.docLink=res.docLink; renderReview(); setR('Filed into ' + n.category + '.'); }
      else setR((res&&res.error)||'Filing failed.', true);
    }).catch(function(err){ setR(err.message||'Network error.', true); });
  }

  function renderReview(){
    segUI();
    var unfiledCount = all.filter(function(n){ return !n.filed; }).length;
    var cats=['All']; all.forEach(function(n){ if(cats.indexOf(n.category)===-1) cats.push(n.category); });
    document.getElementById('rFilters').innerHTML = all.length===0 ? '' : cats.map(function(c){
      var on=rFilter===c, hue=c==='All'?'#54579c':hueFor(c);
      var st = on ? ('border-color:'+rgba(hue,.5)+';background:'+rgba(hue,.12)+';color:'+hue+';') : '';
      return '<button class="chip focus" data-cat="'+aesc(c)+'" style="'+st+'">'+esc(c.toLowerCase())+'</button>';
    }).join('');

    var stream=document.getElementById('rStream');
    if (rLoading){ stream.innerHTML = '<div class="empty"><span class="spin"></span> Loading your notes…</div>'; return; }
    if (all.length===0){ stream.innerHTML = ENDPOINT ? '<div class="empty">Nothing captured yet. Capture a few notes, then come back to review and file them.</div>' : ''; return; }

    var vis = all.filter(function(n){
      var catOk = rFilter==='All' || n.category===rFilter;
      var showOk = rShow==='all' || !n.filed;
      return catOk && showOk;
    });
    if (vis.length===0){
      stream.innerHTML = '<div class="empty">'+ (rShow==='unfiled' ? 'Nothing unfiled here — you\'re all caught up.' : 'No notes in this filter.') +'</div>';
      return;
    }
    stream.innerHTML = vis.map(revCard).join('');
  }

  function revCard(n){
    var hue=hueFor(n.category);
    if (editing===n.row){
      return '<div class="card" style="border-left-color:'+hue+'">'+
        '<div class="ed-label">Category</div><input id="e-cat-'+n.row+'" class="ed-input focus" value="'+aesc(n.category)+'">'+
        '<div class="ed-label">Title</div><input id="e-ttl-'+n.row+'" class="ed-input focus" value="'+aesc(n.title)+'">'+
        '<div class="ed-label">Note</div><textarea id="e-bdy-'+n.row+'" class="ed-area focus">'+esc(n.cleaned)+'</textarea>'+
        '<div class="foot" style="border-top:none;padding-top:10px"><span></span><div class="acts">'+
          '<button class="btn-sm focus" data-act="cancel" data-row="'+n.row+'">cancel</button>'+
          '<button class="btn-sm btn-file focus" data-act="save" data-row="'+n.row+'">save</button>'+
        '</div></div></div>';
    }
    var h='<div class="card" style="border-left-color:'+hue+'">';
    h+='<div class="toprow"><span class="badge" style="color:'+hue+';background:'+rgba(hue,.11)+';border:1px solid '+rgba(hue,.28)+'">'+esc(n.category)+'</span>';
    h+= n.filed ? '<span class="filed">✓ filed</span>' : '<span></span>';
    h+='</div>';
    h+='<div class="title">'+esc(n.title)+'</div>';
    h+='<div class="body">'+esc(n.cleaned)+'</div>';
    if (n.takeaway) h+='<div class="take"><div class="takel">Takeaway</div><div class="taket">'+esc(n.takeaway)+'</div></div>';
    if (n.tags&&n.tags.length) h+='<div class="tags">'+n.tags.map(function(t){return '<span class="pill">#'+esc(t)+'</span>';}).join('')+'</div>';
    h+='<div class="foot"><span class="time">'+esc(fmt(n.time))+'</span><div class="acts">';
    h+='<button class="btn-sm focus" data-act="edit" data-row="'+n.row+'">edit</button>';
    if (n.filed) h+='<a class="link focus" href="'+aesc(n.docLink)+'" target="_blank" rel="noopener">open doc →</a>';
    else h+='<button class="btn-sm btn-file focus" data-act="file" data-row="'+n.row+'">add to '+esc((n.category||'doc').toLowerCase())+'</button>';
    h+='</div></div></div>';
    return h;
  }

  // ── init ──────────────────────────────────────────────────────────────
  renderSetup();
  renderStream();
})();
</script>
</body>
</html>
